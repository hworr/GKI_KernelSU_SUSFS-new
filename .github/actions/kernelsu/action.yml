name: Setup YukiSU
description: Download and configure YukiSU with version tracking

runs:
  using: composite
  steps:
    - name: Download YukiSU
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -euo pipefail

        COMMITS_JSON="${{ github.workspace }}/.github/config/commits.json"
        KSU_SETUP_COMMIT=$(jq -er '.kernelsu.dev' "$COMMITS_JSON")

        curl -LSs "https://raw.githubusercontent.com/Anatdx/YukiSU/main/kernel/setup.sh" | bash -s "$KSU_SETUP_COMMIT"
        
        # YukiSU clones into KernelSU directory
        cd KernelSU/kernel

    - name: Enable YukiSU Config
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        # YukiSU Configuration
        CONFIG_KSU=y
        CONFIG_KPROBES=y
        CONFIG_KPROBE_EVENTS=y
        CONFIG_KRETPROBES=y
        EOF
    
    - name: Extract YukiSU Version Info
      id: ksu-version
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/KernelSU
      run: |
        # Extract and export KSU version info
        KSU_GIT_VERSION=$(git rev-list --count HEAD 2>/dev/null)
        KSU_GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.5.0")
        KSU_COMMIT=$(git rev-parse --short HEAD 2>/dev/null)
        # YukiSU versioning: 10000 + commits - 1135
        KSU_VERSION=$((10000 + KSU_GIT_VERSION - 1135))
        
        echo "KSU_GIT_TAG=$KSU_GIT_TAG" >> $GITHUB_ENV
        echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
        echo "KSU_COMMIT=$KSU_COMMIT" >> $GITHUB_ENV
